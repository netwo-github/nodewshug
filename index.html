<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>守护蔚蓝 保护地球海洋环境</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: "Microsoft YaHei", sans-serif;
        }
        /* 整体背景天空 */
        .sky {
            width: 100%;
            height: 55%;
            background: linear-gradient(180deg, #87CEEB 0%, #4096d1 100%);
            position: relative;
        }
        /* 海水区域 */
        .sea {
            width: 100%;
            height: 45%;
            background: linear-gradient(180deg, #0077be 0%, #003350 100%);
            position: relative;
        }
        /* 海面波纹效果 */
        .wave {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(transparent, rgba(255,255,255,0.25));
            animation: waveMove 6s linear infinite;
        }
        @keyframes waveMove {
            0% { transform: translateX(-100px); }
            100% { transform: translateX(100px); }
        }
        /* 鲸鱼通用样式，全部定格腾空最高点 */
        .whale {
            position: absolute;
            fill: #2c3e50;
            filter: drop-shadow(0 6px 10px rgba(0,20,40,0.4));
        }
        /* 大小不同鲸鱼定位 */
        .whale-big {
            width: 280px;
            top: 32%;
            left: 12%;
        }
        .whale-mid1 {
            width: 190px;
            top: 26%;
            left: 35%;
        }
        .whale-mid2 {
            width: 210px;
            top: 30%;
            left: 58%;
        }
        .whale-small1 {
            width: 110px;
            top: 23%;
            left: 76%;
        }
        .whale-small2 {
            width: 90px;
            top: 36%;
            left: 48%;
        }
        .whale-baby {
            width: 70px;
            top: 34%;
            left: 24%;
        }
        /* 环保文字标题 */
        .title-text {
            position: absolute;
            top: 8%;
            width: 100%;
            text-align: center;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0,50,90,0.6);
        }
        h1 {
            font-size: 48px;
            letter-spacing: 4px;
            margin-bottom: 12px;
        }
        .slogan {
            font-size: 22px;
            opacity: 0.95;
        }
        /* 底部环保标语 */
        .footer-tip {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            color: #e8f8ff;
            font-size: 18px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <!-- 天空区域 -->
    <div class="sky">
        <!-- 顶部环保文字 -->
        <div class="title-text">
            <h1>守护蔚蓝大海 · 保护地球环境</h1>
            <p class="slogan">拒绝海洋污染，还给海洋生物一片纯净家园</p>
        </div>

        <!-- 多只定格腾空鲸鱼 SVG -->
        <!-- 大鲸鱼 -->
        <svg class="whale whale-big" viewBox="0 0 200 100">
            <path d="M180 50 C160 20,100 10,40 30 C10 45,5 70,30 90 C70 105,130 95,170 75 C190 65,185 55,180 50 M160 40 L175 25 L170 42 Z M60 78 L45 95 L65 82 Z" fill="#2c3e50"/>
        </svg>
        <!-- 中型鲸鱼1 -->
        <svg class="whale whale-mid1" viewBox="0 0 200 100">
            <path d="M170 48 C150 22,90 12,35 32 C8 46,4 68,28 88 C65 102,122 92,162 72 C182 62,178 52,170 48 M152 38 L168 22 L164 40 Z M56 76 L42 92 L62 80 Z" fill="#34495e"/>
        </svg>
        <!-- 中型鲸鱼2 -->
        <svg class="whale whale-mid2" viewBox="0 0 200 100">
            <path d="M175 52 C155 24,95 14,42 34 C12 48,8 72,32 92 C75 106,135 96,172 78 C192 68,188 58,175 52 M158 42 L172 26 L168 44 Z M64 80 L48 96 L68 84 Z" fill="#273746"/>
        </svg>
        <!-- 小型鲸鱼1 -->
        <svg class="whale whale-small1" viewBox="0 0 200 100">
            <path d="M165 46 C148 26,88 16,38 36 C14 49,10 66,33 86 C68 100,120 90,158 70 C178 60,174 50,165 46 M148 36 L162 20 L158 38 Z M52 74 L38 90 L58 78 Z" fill="#304050"/>
        </svg>
        <!-- 小型鲸鱼2 -->
        <svg class="whale whale-small2" viewBox="0 0 200 100">
            <path d="M162 44 C145 24,85 14,35 34 C10 47,6 64,29 84 C64 98,116 88,155 68 C175 58,171 48,162 44 M145 34 L159 18 L155 36 Z M49 72 L35 88 L55 76 Z" fill="#2a3a4a"/>
        </svg>
        <!-- 幼年小鲸鱼 -->
        <svg class="whale whale-baby" viewBox="0 0 200 100">
            <path d="M158 42 C142 22,82 12,32 32 C6 45,2 62,25 82 C60 96,112 86,152 66 C172 56,168 46,158 42 M142 32 L156 16 L152 34 Z M46 70 L32 86 L52 74 Z" fill="#354555"/>
        </svg>
    </div>

    <!-- 海水区域 -->
    <div class="sea">
        <div class="wave"></div>
        <!-- 底部环保标语 -->
        <div class="footer-tip">
            减少塑料污染 · 保护海洋生物 · 共建绿色地球
        </div>
    </div>
</body>
</html>
